# Nixpacks config for Railway - builds API from monorepo root
[phases.setup]
nixPkgs = ["nodejs_22"]
cmds = ["corepack enable && corepack prepare pnpm@latest --activate"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @band-it/shared build",
  "cd apps/api && npx prisma generate",
  "pnpm --filter api build",
]

# Auto-syncs additive schema changes on deploy. Destructive changes fail loudly
# rather than dropping data — run a deliberate data-loss push manually if needed.
[start]
cmd = "cd apps/api && npx prisma db push --skip-generate && node dist/index.js"
